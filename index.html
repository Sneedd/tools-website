<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Developer Tools</title>
  </head>
  <body>
    <div class="app-shell">
      <nav class="tools-nav" id="nav-container"></nav>
      <main class="tools-content" id="page-container"></main>
    </div>

    <template id="tpl-nav-entry">
      <div class="tools-nav-entry">
        <a data-role="nav-link">
          <i data-role="nav-icon"></i>
          <span data-role="nav-label"></span>
        </a>
        <div data-role="nav-children"></div>
      </div>
    </template>

    <template id="tpl-nav-subentry">
      <div class="tools-nav-subentry">
        <a data-role="nav-link">
          <i data-role="nav-icon"></i>
          <span data-role="nav-label"></span>
        </a>
      </div>
    </template>

    <template id="tpl-page-home">
      <h1>Developer Tools</h1>
      <p>Tools every developer needs, without the typical nonsense.</p>

      <h4>Hash Functions</h4>
      <ul>
        <li><a href="/hash/md5">MD5</a></li>
        <li><a href="/hash/sha1">SHA-1</a></li>
        <li><a href="/hash/sha224">SHA-224</a></li>
        <li><a href="/hash/sha256">SHA-256</a></li>
        <li><a href="/hash/sha384">SHA-384</a></li>
        <li><a href="/hash/sha512">SHA-512</a></li>
        <li><a href="/hash/sha3">SHA-3</a></li>
      </ul>

      <h4>Json Web Tokens</h4>
      <ul>
        <li><a href="/jwt/analyse">JWT Analyser</a></li>
        <li><a href="/jwt/jwk/generate">JWK Generator</a></li>
      </ul>

      <h4>Password</h4>
      <ul>
        <li><a href="/password/pronounceable">Pronounceable</a></li>
      </ul>

      <h4>Unique Values</h4>
      <ul>
        <li><a href="/unique/random">Random</a></li>
        <li><a href="/unique/uuid/v1">UUID v1</a></li>
        <li><a href="/unique/uuid/v4">UUID v4</a></li>
        <li><a href="/unique/uuid/analyse">UUID Analyser</a></li>
      </ul>

      <h4>Encoding</h4>
      <ul>
        <li><a href="/encoding/base64/encode">Base64 Encode</a></li>
        <li><a href="/encoding/base64/decode">Base64 Decode</a></li>
        <li><a href="/encoding/url/encode">URL Encode</a></li>
        <li><a href="/encoding/url/decode">URL Decode</a></li>
      </ul>
    </template>

    <template id="tpl-page-hash-single">
      <h2 data-role="title"></h2>

      <div class="mb-3">
        <label class="form-label">Text</label>
        <input type="text" class="form-control" data-role="input-text"
          placeholder="Enter any text to calculate the hash ..." />
      </div>

      <br />
      <hr />

      <div class="mb-3">
        <label class="form-label">Hexadecimal</label>
        <input type="text" class="form-control" data-role="out-hex" readonly />
      </div>

      <div class="mb-3">
        <label class="form-label">Base64</label>
        <input type="text" class="form-control" data-role="out-b64" readonly />
      </div>

      <div class="mb-3">
        <label class="form-label">Base64-URL</label>
        <input type="text" class="form-control" data-role="out-b64url" readonly />
      </div>
    </template>

    <template id="tpl-page-password-pronounceable">
      <h2>Pronounceable Password</h2>

      <div class="mb-3">
        <label class="form-label">Length: <span data-role="length-value"></span> characters</label>
        <input type="range" class="form-range" data-role="range-length" min="4" max="64" value="12" />
      </div>

      <div class="mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="password-include-numbers" data-role="checkbox-numbers"
            checked>
          <label class="form-check-label" for="password-include-numbers">Numbers</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="password-include-normal-special"
            data-role="checkbox-normal-special" checked>
          <label class="form-check-label" for="password-include-normal-special">Normal special characters (= - + #
            _ . *)</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="password-include-special" data-role="checkbox-special">
          <label class="form-check-label" for="password-include-special">Special characters ($ % &amp; § / = ?
            "
            !)</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="password-include-extra-special"
            data-role="checkbox-extra-special">
          <label class="form-check-label" for="password-include-extra-special">Extra special characters (; , : .
            &lt; &gt; | @ ' ~ \ {} [] ())</label>
        </div>
      </div>

      <div class="mb-3">
        <button type="button" class="btn btn-light" data-role="btn-create">Create</button>
        <button type="button" class="btn btn-danger" data-role="btn-clear">Clear</button>
      </div>

      <textarea class="form-control tools-uuids-result" data-role="result" rows="12" readonly></textarea>
    </template>

    <template id="tpl-page-unique-random">
      <h2>Random value functions</h2>

      <div class="mb-3">
        <label class="form-label">Size: <span data-role="size-value"></span> bytes</label>
        <input type="range" class="form-range" data-role="range-size" min="1" max="64" value="16" />
      </div>

      <div class="mb-3">
        <div class="form-check">
          <input class="form-check-input" type="radio" name="random-format" id="random-format-hex"
            data-role="radio-hex" checked>
          <label class="form-check-label" for="random-format-hex">Hexadecimal</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="random-format" id="random-format-base64"
            data-role="radio-base64">
          <label class="form-check-label" for="random-format-base64">Base64</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="random-format" id="random-format-base64url"
            data-role="radio-base64url">
          <label class="form-check-label" for="random-format-base64url">Base64-URL</label>
        </div>
      </div>

      <div class="mb-3">
        <div class="btn-group" role="group" aria-label="Basic example">
          <button type="button" class="btn btn-light" data-role="btn-append">Append</button>
        </div>
        <button type="button" class="btn btn-danger" data-role="btn-clear">Clear</button>
      </div>

      <textarea class="form-control tools-uuids-result" data-role="result" rows="12" readonly></textarea>
    </template>

    <template id="tpl-page-unique-uuid-create">
      <h2 data-role="title"></h2>

      <div class="mb-3">
        <div class="btn-group" role="group" aria-label="Basic example">
          <button type="button" class="btn btn-light" data-role="btn-create">Create</button>
        </div>
        <button type="button" class="btn btn-danger" data-role="btn-clear">Clear</button>
      </div>

      <textarea class="form-control tools-uuids-result" data-role="result" rows="12" readonly></textarea>
    </template>

    <template id="tpl-page-unique-uuid-analyse">
      <h2>UUID Analyser</h2>

      <div class="mb-3">
        <label class="form-label">UUID</label>
        <input type="text" class="form-control" data-role="input-validate"
          placeholder="Enter UUID to return its properties ..." />
      </div>

      <div class="mb-3">
        <label class="form-label">Result</label>
        <textarea class="form-control tools-uuids-result" data-role="out-validate" rows="2" readonly></textarea>
      </div>
    </template>

    <template id="tpl-page-encoding-base64-encode">
      <h2>Base64 Encode</h2>

      <div class="mb-3">
        <label class="form-label">Input</label>
        <textarea class="form-control tools-uuids-result" data-role="input" rows="12"
          placeholder="Enter text to encode ..."></textarea>
      </div>

      <div class="mb-3 d-flex align-items-center gap-3">
        <button type="button" class="btn btn-light" data-role="btn-encode">Encode</button>

        <div class="d-flex gap-3">
          <div class="form-check">
            <input class="form-check-input" type="radio" name="base64-encode-variant" id="base64-encode-standard"
              data-role="radio-standard" checked>
            <label class="form-check-label" for="base64-encode-standard">Base64</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="base64-encode-variant" id="base64-encode-url"
              data-role="radio-url">
            <label class="form-check-label" for="base64-encode-url">Base64-URL</label>
          </div>
        </div>

        <select class="form-select w-auto" data-role="select-charset">
          <option value="utf-8" selected>UTF-8</option>
          <option value="windows-1252">Windows-1252</option>
          <option value="iso-8859-1">ISO-8859-1 (Latin-1)</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Output</label>
        <textarea class="form-control tools-uuids-result" data-role="output" rows="12" readonly></textarea>
      </div>
    </template>

    <template id="tpl-page-encoding-base64-decode">
      <h2>Base64 Decode</h2>

      <div class="mb-3">
        <label class="form-label">Input</label>
        <textarea class="form-control tools-uuids-result" data-role="input" rows="12"
          placeholder="Enter Base64 or Base64-URL encoded text ..."></textarea>
      </div>

      <div class="mb-3 d-flex align-items-center gap-3">
        <button type="button" class="btn btn-light" data-role="btn-decode">Decode</button>

        <select class="form-select w-auto" data-role="select-charset">
          <option value="utf-8" selected>UTF-8</option>
          <option value="windows-1252">Windows-1252</option>
          <option value="iso-8859-1">ISO-8859-1 (Latin-1)</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Output</label>
        <textarea class="form-control tools-uuids-result" data-role="output" rows="12" readonly></textarea>
      </div>
    </template>

    <template id="tpl-page-encoding-url-encode">
      <h2>URL Encode</h2>

      <div class="mb-3">
        <label class="form-label">Input</label>
        <textarea class="form-control tools-uuids-result" data-role="input" rows="12"
          placeholder="Enter text to URL-encode ..."></textarea>
      </div>

      <div class="mb-3">
        <button type="button" class="btn btn-light" data-role="btn-encode">Encode</button>
      </div>

      <div class="mb-3">
        <label class="form-label">Output</label>
        <textarea class="form-control tools-uuids-result" data-role="output" rows="12" readonly></textarea>
      </div>
    </template>

    <template id="tpl-page-encoding-url-decode">
      <h2>URL Decode</h2>

      <div class="mb-3">
        <label class="form-label">Input</label>
        <textarea class="form-control tools-uuids-result" data-role="input" rows="12"
          placeholder="Enter URL-encoded text to decode ..."></textarea>
      </div>

      <div class="mb-3">
        <button type="button" class="btn btn-light" data-role="btn-decode">Decode</button>
      </div>

      <div class="mb-3">
        <label class="form-label">Output</label>
        <textarea class="form-control tools-uuids-result" data-role="output" rows="12" readonly></textarea>
      </div>
    </template>

    <template id="tpl-page-jwt-analyse">
      <h2>JWT Analyser</h2>

      <div class="tools-jwt-layout">
        <div class="tools-jwt-col">
          <div class="mb-3">
            <label class="form-label">JWT</label>
            <textarea class="form-control tools-uuids-result" data-role="input-token" rows="16"
              placeholder="Paste a JWT (header.payload.signature) ..."></textarea>
          </div>
        </div>

        <div class="tools-jwt-col">
          <div class="mb-3">
            <label class="form-label">Header</label>
            <pre class="form-control tools-uuids-result tools-jwt-box tools-jwt-box-header" data-role="out-header"></pre>
          </div>

          <div class="mb-3">
            <label class="form-label">Payload</label>
            <pre class="form-control tools-uuids-result tools-jwt-box tools-jwt-box-payload" data-role="out-payload"></pre>
          </div>

          <div class="mb-3">
            <label class="form-label">Signature</label>
            <pre class="form-control tools-uuids-result tools-jwt-box tools-jwt-box-line" data-role="out-signature"></pre>

            <div class="mt-2 d-flex align-items-center gap-3">
              <button type="button" class="btn btn-light" data-role="btn-verify">Verify Signature</button>
              <a data-role="link-discovery" target="_blank" hidden></a>
              <a data-role="link-jwks" target="_blank" hidden></a>
            </div>

            <pre class="form-control tools-uuids-result tools-jwt-box tools-jwt-box-line mt-2"
              data-role="out-verify-status"></pre>
          </div>
        </div>
      </div>
    </template>

    <template id="tpl-page-jwk-generate">
      <h2>JWK Generator</h2>

      <div class="mb-3 d-flex gap-3">
        <div class="form-check">
          <input class="form-check-input" type="radio" name="jwk-alg" id="jwk-alg-rsa" data-role="radio-rsa" checked>
          <label class="form-check-label" for="jwk-alg-rsa">RSA</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="jwk-alg" id="jwk-alg-ecdsa" data-role="radio-ecdsa">
          <label class="form-check-label" for="jwk-alg-ecdsa">ECDSA</label>
        </div>
      </div>

      <div class="mb-3" data-role="wrap-rsa-size">
        <label class="form-label">Modulus Length</label>
        <select class="form-select w-auto" data-role="select-modulus">
          <option value="2048" selected>2048</option>
          <option value="3072">3072</option>
          <option value="4096">4096</option>
        </select>
      </div>

      <div class="mb-3" data-role="wrap-ecdsa-curve" hidden>
        <label class="form-label">Named Curve</label>
        <select class="form-select w-auto" data-role="select-curve">
          <option value="P-256" selected>P-256</option>
          <option value="P-384">P-384</option>
          <option value="P-521">P-521</option>
        </select>
      </div>

      <div class="mb-3">
        <button type="button" class="btn btn-light" data-role="btn-generate">Generate</button>
        <button type="button" class="btn btn-danger" data-role="btn-clear">Clear</button>
      </div>

      <div class="tools-jwt-layout">
        <div class="tools-jwt-col">
          <label class="form-label">Private Key (JWK)</label>
          <pre class="form-control tools-uuids-result tools-jwt-box tools-jwt-box-payload" data-role="out-private"></pre>
        </div>

        <div class="tools-jwt-col">
          <label class="form-label">Public Key (JWK)</label>
          <pre class="form-control tools-uuids-result tools-jwt-box tools-jwt-box-payload" data-role="out-public"></pre>
        </div>
      </div>
    </template>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
